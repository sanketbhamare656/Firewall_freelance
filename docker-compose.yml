# docker-compose.yml
version: '3.8'

services:
  firewall-ai:
    build: .
    container_name: firewall-ai-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./detection_history:/app/detection_history
    restart: unless-stopped
    networks:
      - firewall-network

networks:
  firewall-network:
    driver: bridge